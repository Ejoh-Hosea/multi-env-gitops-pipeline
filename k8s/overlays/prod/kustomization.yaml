apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - ../../base
  - namespace.yaml
patches:
  - path: rollout-patch.yaml
  - path: pdb.yaml
configMapGenerator:
  - name: gitops-demo-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
images:
  - name: ghcr.io/OWNER/gitops-demo-app
    newTag: "prod-placeholder"   # <-- updated only via reviewed promotion PR gated by a GitHub Environment approval
