# Dev prioritizes fast feedback over safety: replace the canary strategy
# with a simple, fast rollout (no pauses, no analysis gate) and run a
# single replica to keep cost down.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-demo-app
spec:
  replicas: 1
  strategy:
    canary:
      steps:
        - setWeight: 100
