# Staging mirrors production's canary + automated analysis so that a bad
# release is caught here first, before a human ever approves the prod
# promotion PR.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-demo-app
spec:
  replicas: 3
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate
        args:
          - name: service-name
            value: gitops-demo-app
        startingStep: 1
      steps:
        - setWeight: 25
        - pause: { duration: 1m }
        - setWeight: 50
        - pause: { duration: 1m }
        - setWeight: 100
