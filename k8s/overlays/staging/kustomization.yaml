apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - ../../base
  - namespace.yaml
patches:
  - path: rollout-patch.yaml
configMapGenerator:
  - name: gitops-demo-app-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
images:
  - name: ghcr.io/OWNER/gitops-demo-app
    newTag: "staging-placeholder"   # <-- updated only via reviewed promotion PR (see scripts/promote.sh)
